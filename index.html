<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim & Ollie Secure Channel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Rain Canvas */
        #matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Terminal Interface Card */
        .terminal-card {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #ff69b4;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4), inset 0 0 10px rgba(255, 105, 180, 0.2);
            border-radius: 8px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.6);
        }

        /* Header Elements */
        h1 {
            color: #ff69b4;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.8);
        }

        .status {
            text-align: center;
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 25px;
            border-bottom: 1px dashed rgba(255, 105, 180, 0.5);
            padding-bottom: 10px;
        }

        .status-blink {
            color: #ffb6c1;
            animation: blink 1.5s infinite;
        }

        /* Message Body */
        .message-content {
            line-height: 1.6;
            font-size: 1.05rem;
        }

        .highlight {
            color: #ff69b4;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 105, 180, 0.5);
        }

        p {
            margin-bottom: 15px;
        }

        .signature {
            margin-top: 25px;
            text-align: right;
            color: #ffb6c1;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Terminal Scanline/Glitch effects */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="terminal-card">
        <h1>Kim & Ollie Secure Channel</h1>
        <div class="status">Status: <span class="status-blink">Access granted…</span></div>
        
        <div class="message-content">
            <p>Hey Bear,</p>
            <p>No ordinary note today.</p>
            <p><span class="highlight">Mission (if you choose to accept):</span></p>
            <p>Kim & Ollie’s Cigar Bar (back garden) tonight at <span class="highlight">8:00pm</span>.</p>
            <p>Hand Made Mojitos + a new Plasencia you haven’t tried yet.</p>
            <p>Low-key date with me if you’re up for it?</p>
            <div class="signature">_Ollie</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Set canvas size to full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Matrix characters (Katakana, alphabets, numbers)
        const chars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890KIMOLLIE";
        const charArr = chars.split('');

        const fontSize = 14;
        let columns = canvas.width / fontSize;

        // Tracks the y-coordinate for each column drop
        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            // Slight opacity black background to create trailing/fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < rainDrops.length; i++) {
                // Randomly select character
                const text = charArr[Math.floor(Math.random() * charArr.length)];
                
                // Mix white and shades of hot/light pink for the hacker girly palette
                if (Math.random() > 0.85) {
                    ctx.fillStyle = '#ffffff'; // White highlight highlights
                } else if (Math.random() > 0.4) {
                    ctx.fillStyle = '#ff69b4'; // Hot Pink
                } else {
                    ctx.fillStyle = '#ffb6c1'; // Light Pink
                }

                ctx.font = fontSize + 'px monospace';
                
                // Draw character
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                // Reset drop to top once it hits bottom or randomly after passing threshold
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        // Recalculate column count if window is resized mid-session
        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            for (let x = 0; x < columns; x++) {
                if(!rainDrops[x]) rainDrops[x] = 1;
            }
        });

        setInterval(drawMatrix, 33); // Smooth ~30fps rendering
    </script>
</body>
</html>
